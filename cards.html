<!DOCTYPE html>
<html lang="en">
<head>
    <!--HEY  -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cards</title>
    <style>
        /* YES */
                *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
/* HII */
        }
        .container{
            width:100vw;
            height: 100vh;
            background-color: #94BBE9;
            background-image: linear-gradient(90deg,rgba(2, 0, 36, 1) 0%, rgba(9, 9, 121, 1) 35%, rgba(0, 212, 255, 1) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            width: 360px;
            height: 540px;
            background-color: white;
            border-radius: 20px;
             
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 40px;


        }
        .card img{
            height: 40%;
            border-radius: 10px;

        }
        .card h2{
            font-weight: bold;
            font-size: 1.5rem;
        }
        .card p{
            font-size: 1.3em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
           <img
             src="qr-code-working.jpg"
             />
             <h2>Improve Your Frontend Skills by developing project</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Enim fugiat obcaecati omnis earum totam, nisi nihil dicta accusantium!</p>
        </div>

    </div>
</body>
</html>
